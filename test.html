<!DOCTYPE html>
<html>

<head>
<title>Construction AI Estimator</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f8;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

input, textarea{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:5px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:80px;
}

button{
background:#2c7be5;
color:white;
border:none;
padding:12px;
border-radius:6px;
font-size:16px;
cursor:pointer;
width:100%;
}

button:hover{
background:#1a5fd0;
}

.resultBox{
margin-top:25px;
background:#111;
color:#00ff9c;
padding:20px;
border-radius:6px;
white-space:pre-wrap;
font-family:monospace;
}

.loading{
color:#888;
font-style:italic;
}

</style>

</head>

<body>

<div class="container">

<h2>🏗 Construction AI Estimator</h2>

<input id="project" placeholder="Project type">

<input id="size" placeholder="Project size">

<input id="materials" placeholder="Materials">

<input id="budget" placeholder="Budget">

<input id="timeline" placeholder="Timeline">

<input id="city" placeholder="City">

<textarea id="description" placeholder="Project description"></textarea>

<button onclick="sendLead()">Analyze Project</button>

<div id="result" class="resultBox"></div>

</div>

<script>

async function sendLead(){

console.log("Function started")

document.getElementById("result").innerHTML =
"<span class='loading'>Analyzing project...</span>"

try{

const data = {
project: document.getElementById("project").value,
size: document.getElementById("size").value,
materials: document.getElementById("materials").value,
budget: document.getElementById("budget").value,
timeline: document.getElementById("timeline").value,
city: document.getElementById("city").value,
description: document.getElementById("description").value
}

console.log("Sending request...")

const response = await fetch("http://127.0.0.1:5050/analyze", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
})

console.log("Response received")

const result = await response.json()

document.getElementById("result").innerText = result.analysis

}

catch(error){

console.error("Error occurred:", error)

document.getElementById("result").innerHTML =
"<span style='color:red'>Error connecting to AI backend</span>"

}

}

</script>

</body>
</html>
